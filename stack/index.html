  .gate-card{

  .gate-in{background:rgba(20,16,26,.92);border:1px solid rgba(154,109,215,.5);border-radius:var(--radius);padding:1.8rem;max-width:430px;box-shadow:0 30px 90px rgba(0,0,0,.5)}
  .gate-in h3{font-size:1.25rem;font-weight:900;letter-spacing:-.01em}
  .gate-in p{font-size:.9rem;color:var(--muted);margin-top:.6rem}

    width:100%;margin-top:1rem;background:var(--panel);border:1px solid var(--line);border-radius:12px;

  .consent{display:flex;gap:.6rem;align-items:flex-start;margin-top:.9rem;font-size:.8rem;color:var(--muted)}

  .gate-in .btn{width:100%;margin-top:1rem}
  .gate-err{color:#FF8A8A;font-size:.82rem;margin-top:.6rem}

  .actions{display:flex;gap:1rem;flex-wrap:wrap;margin-top:1.4rem}
  .substack{margin-top:1.2rem;background:linear-gradient(135deg,#241a33,#1F1829);border:1px solid rgba(154,109,215,.4);border-radius:var(--radius);padding:1.7rem 1.8rem}
  .substack h3{font-size:1.2rem;font-weight:900}
  .substack p{color:var(--muted);font-size:.95rem;margin-top:.6rem;max-width:54ch}
  .foot-line{margin-top:2.4rem;padding-top:1.4rem;border-top:1px solid var(--line);font-size:.85rem;color:var(--muted)}
  .foot-line a{color:var(--lilac)}

  footer{border-top:1px solid var(--line);margin-top:4rem;padding:2rem 0;font-size:.82rem;color:var(--muted)}
</style>

(function(){

  var answers = { work:[], level:null, roi:null, team:null, biz:[], tabs:null, wish:'' };
  var step = -1; /* -1 intro, 0..6 questions, 7 loading, 8 reading */
  var unlocked = false;

  function track(ev, extra){ try{ if(window.gtag) gtag('event', ev, extra||{}); }catch(e){} }
  function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  function persona(){
    var list = CONTENT.personas;
    for (var i=0;i<list.length;i++){ if(list[i].when(answers)) return list[i]; }
    return list[list.length-1];

  function topWork(){ return answers.work[0] || 'strategy'; }
  function agentSet(){ return CONTENT.agents[answers.roi || 'hours']; }
  function hoursBack(){
    var t=0; agentSet().forEach(function(a){ t += parseInt(a.hrs.replace(/[^0-9]/g,''),10)||0; });
    return t;
  }

  function render(){
    window.scrollTo(0,0);
    if(step===-1) return renderIntro();
    if(step>=0 && step<=6) return renderQ(step);
    if(step===7) return renderLoading();
    renderReading();
  }

  function renderIntro(){
    app.innerHTML =
      '<div class="screen intro">' +
      '<p class="eyebrow">'+CONTENT.intro.eyebrow+'</p>' +
      '<h1>'+CONTENT.intro.title+'</h1>' +

      '<button class="btn" id="start">'+CONTENT.intro.button+'</button>' +
      '<p class="tiny">'+CONTENT.intro.tiny+'</p></div>';
    document.getElementById('start').onclick = function(){ track('quiz_start'); step=0; render(); };
  }

  function renderQ(i){
    var q = CONTENT.questions[i];
    var dots=''; for(var d=0;d<7;d++) dots += '<span class="dot'+(d<=i?' on':'')+'"></span>';
    var html = '<div class="screen q"><div class="dots" aria-label="Question '+(i+1)+' of 7">'+dots+'</div>' +
      '<h2>'+q.q+'</h2>' + (q.hint?'<p class="hint">'+q.hint+'</p>':'');
    if(q.free){
      html += '<textarea id="free" maxlength="200" placeholder="One line is plenty."></textarea>';
    } else {
      html += '<div class="opts">';
      q.opts.forEach(function(o){
        var sel = q.multi ? (answers[q.key].indexOf(o[0])>-1) : (answers[q.key]===o[0]);
        html += '<button class="opt'+(sel?' sel':'')+'" data-v="'+o[0]+'">'+o[1]+'</button>';
      });
      html += '</div>';
    }
    html += '<div class="q-nav">' +
      (i>0?'<button class="back-btn" id="back">← Back</button>':'<span></span>') +
      '<button class="btn" id="next"'+(canNext(q)?'':' disabled')+'>'+(i===6?'Get my reading →':'Next →')+'</button></div></div>';
    app.innerHTML = html;

    if(q.free){
      var ta=document.getElementById('free'); ta.value=answers.wish||''; ta.focus();
      ta.oninput=function(){ answers.wish=ta.value; };
      document.getElementById('next').disabled=false;
    } else {
      app.querySelectorAll('.opt').forEach(function(btn){
        btn.onclick=function(){
          var v=btn.getAttribute('data-v');
          if(q.multi){
            var arr=answers[q.key], ix=arr.indexOf(v);
            if(ix>-1) arr.splice(ix,1); else if(arr.length<q.multi) arr.push(v);
          } else {
            answers[q.key]=v;
          }
          renderQ(i); /* re-render keeps it simple */
          if(!q.multi){ setTimeout(function(){ advance(i); }, 220); }
        };
      });
    }
    var back=document.getElementById('back'); if(back) back.onclick=function(){ step=i-1; render(); };
    document.getElementById('next').onclick=function(){ advance(i); };
    track('q'+(i+1)+'_shown');
  }

  function canNext(q){
    if(q.free) return true;
    return q.multi ? answers[q.key].length>0 : !!answers[q.key];
  }
  function advance(i){
    if(!canNext(CONTENT.questions[i])) return;
    step = i+1===7 ? 7 : i+1;
    render();
    if(step===7) setTimeout(function(){ step=8; render(); }, 1400);
  }

  function renderLoading(){
    app.innerHTML = '<div class="loading"><div class="pulse" role="presentation"></div><p>'+CONTENT.loading+'</p></div>';
  }

  function renderReading(){
    var p = persona();
    var tool = CONTENT.toolCalls[topWork()];
    var hrs = hoursBack();
    var ag = agentSet();
    var pr = CONTENT.prompts[answers.roi||'hours'];

    var teamHtml=''; CONTENT.team.forEach(function(m){ teamHtml += '<div class="member"><span class="role">'+m.role+'</span><p>'+m.line+'</p></div>'; });
    var agHtml=''; ag.forEach(function(a){ agHtml += '<div class="agent"><span class="who">'+a.who+'</span><span class="job">'+a.job+'</span><span class="hrs">'+a.hrs+'</span></div>'; });

    app.innerHTML =
      '<div class="screen reading">' +
      '<p class="eyebrow">'+CONFIG.resultTitle+'</p>' +
      '<div class="persona"><div class="name">'+p.name+'</div><p class="truth">'+p.truth+'</p></div>' +

      '<div class="block"><h3><span class="tag">The first fix</span>Your top tool call</h3><p>'+tool+'</p></div>' +

      '<div class="block"><h3><span class="tag">The math, not the pitch</span>Hours back</h3>' +
      '<div class="hours"><span class="n">'+hrs+'</span><p>hours a week, roughly, once a right-sized AI team is running. Here is that team.</p></div></div>' +

      '<div class="block gated locked" id="gated">' +
        '<div class="gate-content">' +
        '<h3><span class="tag">Which model for which job</span>Your AI team</h3><div class="team-row">'+teamHtml+'</div>' +
        '<h3 style="margin-top:1.6rem"><span class="tag">Your first hires</span>The agents worth building first</h3><div class="agent-cards">'+agHtml+'</div>' +
        '<h3 style="margin-top:1.6rem"><span class="tag">The free win</span>'+pr.label+'</h3><p>'+pr.where+'</p>' +
        '<div class="prompt-box" id="prompt-text">'+esc(pr.text)+'</div>' +
        '<button class="btn btn-ghost copy-btn" id="copy">Copy the prompt</button>' +
        '</div>' +
        '<div class="gate-card" id="gate">' +
          '<div class="gate-in"><h3>'+CONTENT.gate.title+'</h3><p>'+CONTENT.gate.body+'</p>' +
          '<input type="email" id="email" placeholder="you@yourcompany.com" autocomplete="email" aria-label="Email address">' +
          '<label class="consent"><input type="checkbox" id="consent"> <span>'+CONTENT.gate.consent+'</span></label>' +
          '<button class="btn" id="unlock">'+CONTENT.gate.button+'</button>' +
          '<p class="gate-err hidden" id="err"></p></div>' +
        '</div>' +
      '</div>' +

      '<div class="actions" id="post-gate" style="display:none">' +
        '<button class="btn btn-ghost" id="share">'+CONTENT.share.button+'</button>' +
      '</div>' +
      '<div class="substack hidden" id="substack"><h3>'+CONTENT.substack.title+'</h3><p>'+CONTENT.substack.body+'</p>' +
      '<div class="actions"><a class="btn" id="sub-link" target="_blank" rel="noopener">'+CONTENT.substack.button+'</a></div></div>' +
      '<p class="foot-line hidden" id="saved-line">'+CONTENT.afterGate+'</p>' +
      '<p class="foot-line">'+CONTENT.bridge.text+' <a href="'+CONTENT.bridge.href+'">'+CONTENT.bridge.cta+'</a> <a href="'+CONTENT.bridge.href2+'" style="margin-left:1rem">'+CONTENT.bridge.cta2+'</a></p>' +
      '</div>';

    track('gate_shown');
    document.getElementById('copy').onclick=function(){
      var t=document.getElementById('prompt-text').textContent;
      navigator.clipboard.writeText(t).then(function(){ document.getElementById('copy').textContent='Copied.'; });
    };
    document.getElementById('unlock').onclick=submitGate;
    document.getElementById('share').onclick=function(){ track('share_tapped'); shareCard(p.name, hrs); };
    if(unlocked) openUp();
  }

  function submitGate(){
    var email=document.getElementById('email').value.trim();
    var consent=document.getElementById('consent').checked;
    var err=document.getElementById('err');
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ err.textContent='That email does not look right.'; err.classList.remove('hidden'); return; }
    if(!consent){ err.textContent='Tick the consent box so I am allowed to email you.'; err.classList.remove('hidden'); return; }
    err.classList.add('hidden');
    track('email_submitted');

    /* Capture to the existing Time Rich forms worker -> Notion.
       The reading unlocks regardless of network result: value is never
       held hostage to infrastructure (Part 0, rule 2 of the brief). */
    var payload = {
      "Email": email,
      "Full name": "AI Stack Reading lead",
      "Source": "AI Stack Reading (/stack)",
      "Persona": persona().name,
      "Work mix": answers.work.join(', '),
      "AI level": answers.level,
      "Wants back": answers.roi,
      "Team shape": answers.team,
      "Runs on": answers.biz.join(', '),
      "Tabs": answers.tabs,
      "Hand-off wish": answers.wish || '(skipped)',
      "Consent": "Yes: reading + weekly letter (" + new Date().toISOString() + ")"
    };
    try{
      fetch(CONFIG.captureEndpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    }catch(e){}
    try{ localStorage.setItem('tr-stack-email', email); }catch(e){}
    unlocked = true;
    openUp(email);
  }

  function openUp(email){
    var g=document.getElementById('gated'); g.classList.remove('locked');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('post-gate').style.display='flex';
    document.getElementById('saved-line').classList.remove('hidden');
    if(CONFIG.substackUrl){
      var box=document.getElementById('substack'); box.classList.remove('hidden');
      var mail = email || (function(){ try{return localStorage.getItem('tr-stack-email')||''}catch(e){return ''} })();
      var link=document.getElementById('sub-link');
      link.href = CONFIG.substackUrl.replace(/\/$/,'') + '/subscribe' + (mail ? ('?email='+encodeURIComponent(mail)) : '');
      link.onclick=function(){ track('substack_clicked'); };
    }
  }

  /* Shareable 1080-square card, rendered client-side (Part 7.7). */
  function shareCard(name, hrs){
    var c=document.createElement('canvas'); c.width=1080; c.height=1080;
    var x=c.getContext('2d');
    x.fillStyle='#14101A'; x.fillRect(0,0,1080,1080);
    var grad=x.createRadialGradient(820,220,60,820,220,620);
    grad.addColorStop(0,'rgba(124,58,237,.35)'); grad.addColorStop(1,'rgba(124,58,237,0)');
    x.fillStyle=grad; x.fillRect(0,0,1080,1080);
    x.fillStyle='#EBD1FA'; x.font='800 34px Archivo, sans-serif'; x.letterSpacing='8px';
    x.fillText('TIME RICH · AI READING', 80, 120);
    x.letterSpacing='0px';
    x.fillStyle='#F4EEFB'; x.font='900 88px Archivo, sans-serif';
    wrapText(x, name, 80, 320, 920, 96);
    x.fillStyle='#A78BFA'; x.font='900 200px Archivo, sans-serif';
    x.fillText(hrs+' hrs', 80, 720);
    x.fillStyle='#A79DB8'; x.font='500 40px Archivo, sans-serif';
    x.fillText('a week back, with the right AI team', 80, 790);
    x.fillStyle='#9A6DD7'; x.font='800 40px Archivo, sans-serif';
    x.fillText('Find your stack → '+CONFIG.shareUrl, 80, 980);
    c.toBlob(function(blob){
      var file = new File([blob], 'time-rich-ai-reading.png', {type:'image/png'});
      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file], title:'My AI stack reading'}).catch(function(){ download(blob); });
      } else { download(blob); }
    });
  }
  function wrapText(x, text, lx, ly, maxW, lh){
    var words=text.split(' '), line='';
    words.forEach(function(w){
      var t=line+w+' ';
      if(x.measureText(t).width>maxW && line){ x.fillText(line,lx,ly); line=w+' '; ly+=lh; }
      else line=t;
    });
    x.fillText(line,lx,ly);
  }

  /* ?demo=1 jumps straight to a filled-in reading for review */
  if(/[?&]demo=1/.test(location.search)){
    answers={ work:['writing','research'], level:'l3', roi:'audience', team:'small', biz:['speaking'], tabs:'t3', wish:'Turn my podcast into posts' };
    step=8;
  }
  render();
})();
</script>
</body>
</html>
