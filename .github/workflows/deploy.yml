name: Deploy to GitHub Pages

# Publishes the static site whenever you push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel an in-progress run if a newer push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # the whole repo root is the site (index.html lives here)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
