# Cloudflare Worker that receives Time Rich applications and writes them to Notion.
#
# Deploy:
#   cd worker
#   npx wrangler deploy
#
# Set your secrets (these are NOT stored in this file):
#   npx wrangler secret put NOTION_TOKEN          # your Notion integration token
#   npx wrangler secret put NOTION_DATABASE_ID    # the applications database id
#   npx wrangler secret put ANTHROPIC_API_KEY     # powers the corner chatbot (the brain)
#
# After deploy, wrangler prints a URL like:
#   https://time-rich-forms.<your-subdomain>.workers.dev
# Paste that into FORM_ENDPOINT in index.html (the application form),
# and set the coaching form's action to <that URL>/coaching
# (in "17 — AI Coaching Intake.html", replace [WORKER_URL] with that base URL).

name = "time-rich-forms"
main = "src/index.js"
compatibility_date = "2024-11-01"

[vars]
# Locked to the live domain so only timerich.ai can submit the application form.
# Use "*" only when testing locally.
ALLOWED_ORIGIN = "https://timerich.ai,https://www.timerich.ai"

# 1:1 AI OS Coaching intake form (POST /coaching) -> its own Notion database.
# Id is from the database URL. IMPORTANT: connect the SAME Notion integration
# (NOTION_TOKEN) to this database too (••• -> Connections), or writes will 404.
NOTION_COACHING_DATABASE_ID = "f4f0b1c4-1b81-463c-8ff3-3e625aaf847a"
